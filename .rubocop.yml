inherit_gem:
  rubocop-shopify: rubocop.yml

plugins:
  - rubocop-factory_bot
  - rubocop-rails
  - rubocop-rspec
  - rubocop-rspec_rails

Rails/FilePath:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Style/SymbolArray:
  Enabled: false

Style/WordArray:
  Enabled: false

Style/MethodCallWithArgsParentheses:
  Enabled: false

Layout/MultilineMethodArgumentLineBreaks:
  Enabled: false

Layout/SpaceInsideHashLiteralBraces:
  EnforcedStyle: no_space

Style/ClassMethodsDefinitions:
  Enabled: false

Style/SingleLineMethods:
  Enabled: false

Style/InvertibleUnlessCondition:
  InverseMethods:
    # disable rubocop-rails rules depending on ActiveSupport methods
    :include?: ~
    :exclude?: ~

Style/AccessModifierDeclarations:
  Enabled: true
  EnforcedStyle: inline

Style/SpecialGlobalVars:
  Enabled: false

Style/CaseLikeIf:
  Enabled: true
  MinBranchesCount: 2

Style/EmptyCaseCondition:
  Enabled: false

Lint/NoReturnInBeginEndBlocks:
  Enabled: false

Layout/EndAlignment:
  EnforcedStyleAlignWith: start_of_line
